<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Resume Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* --- GENERAL & FORM STYLES --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #2c231f; }
        .alert {
            display: none;
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border: 1px solid #f5c6cb;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-top: 30px;
            margin-bottom: 15px;
        }
        .section-header h2 { margin: 0; color: #2c231f; }
        .add-btn {
            background-color: #d8c8bd;
            color: #2c231f;
            border: none;
            padding: 5px 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .add-btn:hover { background-color: #c4b3a6; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="email"], input[type="tel"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }
        textarea { resize: vertical; min-height: 80px; }
        input.error, textarea.error { border-color: red; background-color: #fff8f8; }
        
        .repeater-item {
            background: #f9f9f9;
            padding: 15px;
            border: 1px dashed #ccc;
            border-radius: 5px;
            margin-bottom: 15px;
            position: relative;
        }
        .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }

        .action-buttons { text-align: center; margin-top: 30px; }
        .primary-btn {
            background-color: #2c231f;
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* --- MODAL STYLES --- */
        #preview-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            overflow-y: auto;
            padding: 40px 0;
        }
        .modal-content {
            width: 800px;
            margin: 0 auto;
            background: transparent;
        }
        .modal-actions {
            text-align: center;
            margin-top: 20px;
            background: #fff;
            padding: 15px;
            border-radius: 5px;
        }
        .modal-actions button {
            padding: 10px 20px;
            margin: 0 10px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }
        .btn-edit { background: #6c757d; color: white; }
        .btn-download { background: #28a745; color: white; }

        /* --- RESUME PREVIEW STYLES (Matching the Image) --- */
        #resume-document {
            display: flex;
            width: 800px;
            min-height: 1131px; /* A4 Ratio */
            background: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }
        /* Background Shapes */
        .shape-top-left {
            position: absolute;
            top: -50px;
            left: -50px;
            width: 250px;
            height: 250px;
            border: 40px solid #d8c8bd;
            border-radius: 50%;
            z-index: 0;
        }
        .shape-bottom-left {
            position: absolute;
            bottom: -50px;
            left: -50px;
            width: 200px;
            height: 200px;
            border: 40px solid #d8c8bd;
            border-radius: 50%;
            z-index: 0;
            opacity: 0.5;
        }

        /* Left Column */
        .left-col {
            width: 55%;
            padding: 60px 40px;
            position: relative;
            z-index: 1;
        }
        .resume-name {
            font-size: 42px;
            font-weight: 900;
            text-transform: uppercase;
            margin: 20px 0 5px 0;
            line-height: 1;
            color: #111;
        }
        .resume-title {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #333;
            margin-bottom: 50px;
        }
        .section-title-left {
            font-size: 24px;
            font-weight: bold;
            margin: 30px 0 15px 0;
            color: #111;
        }
        .about-text { font-size: 13px; line-height: 1.6; color: #555; }
        
        .exp-item { margin-bottom: 20px; }
        .exp-header { font-weight: bold; font-size: 14px; color: #111; margin-bottom: 3px; }
        .exp-title { font-style: italic; font-size: 13px; color: #555; margin-bottom: 8px; }
        .exp-desc { font-size: 12px; line-height: 1.5; color: #555; }

        .contact-item { font-size: 13px; color: #555; margin-bottom: 8px; }

        /* Right Column */
        .right-col {
            width: 45%;
            background-color: #2a211e;
            color: #fff;
            padding: 60px 40px;
            position: relative;
            z-index: 1;
            border-top-left-radius: 250px; /* The curve */
            margin-top: 150px; /* space for image */
        }
        
        /* Profile Image */
        .profile-img-container {
            position: absolute;
            top: -150px;
            right: 20px;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            overflow: hidden;
            background: #d8c8bd;
            z-index: 2;
        }
        .profile-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .section-title-right {
            font-size: 24px;
            font-weight: bold;
            margin: 40px 0 20px 0;
            color: #fff;
        }
        .edu-item { margin-bottom: 25px; }
        .edu-year-uni { font-size: 13px; margin-bottom: 5px; }
        .edu-year { font-weight: bold; }
        .edu-uni { font-style: italic; opacity: 0.9; }
        .edu-degree { font-weight: bold; font-size: 15px; margin-bottom: 8px; }
        .edu-desc { font-size: 12px; line-height: 1.5; opacity: 0.8; margin-bottom: 5px;}
        .edu-percent { font-size: 12px; font-weight: bold; color: #d8c8bd;}

        .skill-list { list-style: none; padding: 0; margin: 0; }
        .skill-list li {
            font-size: 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }
        .skill-list li::before {
            content: '•';
            color: #fff;
            font-size: 20px;
            margin-right: 10px;
        }

        .lang-item {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
        }
        .lang-bar {
            width: 100px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            position: relative;
        }
        .lang-bar-fill {
            position: absolute;
            top: 0; left: 0; height: 100%;
            background: #fff;
            width: 80%; /* Default */
        }

    </style>
</head>
<body>

<div class="container" id="form-container">
    <h1>Create Your Resume</h1>
    <div class="alert" id="error-alert">Please fill in all required fields highlighted in red!</div>

    <form id="resume-form">
        <div class="section-header"><h2>Basic Details</h2></div>
        <div class="form-group">
            <label>Profile Photo</label>
            <input type="file" id="photo-input" accept="image/*">
        </div>
        <div style="display:flex; gap:15px;">
            <div class="form-group" style="flex:1;">
                <label>First Name</label>
                <input type="text" id="first-name" class="req" placeholder="e.g. OLIVIA">
            </div>
            <div class="form-group" style="flex:1;">
                <label>Last Name</label>
                <input type="text" id="last-name" class="req" placeholder="e.g. WILSON">
            </div>
        </div>
        <div class="form-group">
            <label>Job Title</label>
            <input type="text" id="job-title" class="req" placeholder="e.g. BUSINESS GRADUATE">
        </div>

        <div class="section-header"><h2>About Me</h2></div>
        <div class="form-group">
            <label>Summary</label>
            <textarea id="about-me" class="req" placeholder="Write a short professional summary..."></textarea>
        </div>

        <div class="section-header"><h2>Contact Details</h2></div>
        <div class="form-group">
            <label>Mobile Number</label>
            <input type="tel" id="mobile" class="req" placeholder="+123-456-7890">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" class="req" placeholder="hello@reallygreatsite.com">
        </div>
        <div class="form-group">
            <label>Location</label>
            <input type="text" id="location" class="req" placeholder="123 Anywhere St., Any City">
        </div>

        <div class="section-header">
            <h2>Experience</h2>
            <button type="button" class="add-btn" onclick="addRepeater('exp-container', 'exp-template')">+</button>
        </div>
        <div id="exp-container"></div>

        <div class="section-header">
            <h2>Education</h2>
            <button type="button" class="add-btn" onclick="addRepeater('edu-container', 'edu-template')">+</button>
        </div>
        <div id="edu-container"></div>

        <div class="section-header">
            <h2>Expertise (Skills)</h2>
            <button type="button" class="add-btn" onclick="addRepeater('skill-container', 'skill-template')">+</button>
        </div>
        <div id="skill-container"></div>

        <div class="section-header">
            <h2>Language</h2>
            <button type="button" class="add-btn" onclick="addRepeater('lang-container', 'lang-template')">+</button>
        </div>
        <div id="lang-container"></div>

        <div class="action-buttons">
            <button type="button" class="primary-btn" onclick="generatePreview()">Preview Resume</button>
        </div>
    </form>
</div>

<template id="exp-template">
    <div class="repeater-item">
        <button type="button" class="remove-btn" onclick="this.parentElement.remove()">Remove</button>
        <div style="display:flex; gap:15px;">
            <div class="form-group" style="flex:1;">
                <label>Company Name</label>
                <input type="text" class="exp-comp req" placeholder="Company Name">
            </div>
            <div class="form-group" style="flex:1;">
                <label>Years (e.g. 2017 - 2020)</label>
                <input type="text" class="exp-years req" placeholder="2017 - 2020">
            </div>
        </div>
        <div class="form-group">
            <label>Job Position</label>
            <input type="text" class="exp-pos req" placeholder="Job Position">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea class="exp-desc-input req" placeholder="Job description..."></textarea>
        </div>
    </div>
</template>

<template id="edu-template">
    <div class="repeater-item">
        <button type="button" class="remove-btn" onclick="this.parentElement.remove()">Remove</button>
        <div style="display:flex; gap:15px;">
            <div class="form-group" style="flex:1;">
                <label>Year</label>
                <input type="text" class="edu-year-input req" placeholder="e.g. 2015">
            </div>
            <div class="form-group" style="flex:1;">
                <label>University Name</label>
                <input type="text" class="edu-uni-input req" placeholder="University Name">
            </div>
        </div>
        <div class="form-group">
            <label>Degree</label>
            <input type="text" class="edu-deg-input req" placeholder="Your Degree">
        </div>
        <div class="form-group">
            <label>Percentage / CGPA</label>
            <input type="text" class="edu-perc-input req" placeholder="e.g. Percentage: 90%">
        </div>
        <div class="form-group">
            <label>Description (Optional)</label>
            <textarea class="edu-desc-input" placeholder="Brief description..."></textarea>
        </div>
    </div>
</template>

<template id="skill-template">
    <div class="repeater-item" style="padding: 10px 15px;">
        <button type="button" class="remove-btn" style="top:5px;" onclick="this.parentElement.remove()">X</button>
        <input type="text" class="skill-val req" placeholder="e.g. ui/ux design" style="width: 80%;">
    </div>
</template>

<template id="lang-template">
    <div class="repeater-item" style="padding: 10px 15px;">
        <button type="button" class="remove-btn" style="top:5px;" onclick="this.parentElement.remove()">X</button>
        <div style="display:flex; gap:15px;">
            <input type="text" class="lang-name req" placeholder="e.g. Spanish" style="flex:1;">
            <input type="number" class="lang-prof req" placeholder="Proficiency % (0-100)" min="0" max="100" style="flex:1;">
        </div>
    </div>
</template>

<div id="preview-modal">
    <div class="modal-content">
        <div id="resume-document">
            <div class="shape-top-left"></div>
            <div class="shape-bottom-left"></div>
            
            <div class="left-col">
                <div class="resume-name"><span id="p-fname">OLIVIA</span> <span id="p-lname">WILSON</span></div>
                <div class="resume-title" id="p-title">BUSINESS GRADUATE</div>
                
                <div class="section-title-left">About Me</div>
                <div class="about-text" id="p-about"></div>

                <div class="section-title-left">Experience</div>
                <div id="p-exp-container"></div>

                <div class="section-title-left" style="margin-top: 40px;">Contact</div>
                <div class="contact-item" id="p-mobile"></div>
                <div class="contact-item" id="p-email"></div>
                <div class="contact-item" id="p-location"></div>
            </div>

            <div class="right-col">
                <div class="profile-img-container">
                    <img id="p-photo" src="https://via.placeholder.com/300" alt="Profile Photo">
                </div>

                <div class="section-title-right" style="margin-top: 100px;">Education</div>
                <div id="p-edu-container"></div>

                <div class="section-title-right">Expertise</div>
                <ul class="skill-list" id="p-skill-container"></ul>

                <div class="section-title-right">Language</div>
                <div id="p-lang-container"></div>
            </div>
        </div>

        <div class="modal-actions">
            <button class="btn-edit" onclick="closePreview()">Edit Form</button>
            <button class="btn-download" onclick="downloadPDF()">Download PDF</button>
        </div>
    </div>
</div>

<script>
    // Initialize one blank item for each section
    document.addEventListener("DOMContentLoaded", () => {
        addRepeater('exp-container', 'exp-template');
        addRepeater('edu-container', 'edu-template');
        addRepeater('skill-container', 'skill-template');
        addRepeater('lang-container', 'lang-template');
    });

    // Handle Photo Upload Preview
    let photoDataURL = "https://via.placeholder.com/300";
    document.getElementById('photo-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                photoDataURL = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    });

    // Add Repeater Fields
    function addRepeater(containerId, templateId) {
        const template = document.getElementById(templateId);
        const clone = template.content.cloneNode(true);
        document.getElementById(containerId).appendChild(clone);
    }

    // Validation & Generate Preview
    function generatePreview() {
        let isValid = true;
        const reqFields = document.querySelectorAll('.req');
        const alertBox = document.getElementById('error-alert');

        // Check required fields
        reqFields.forEach(field => {
            if (!field.value.trim()) {
                isValid = false;
                field.classList.add('error');
            } else {
                field.classList.remove('error');
            }
        });

        if (!isValid) {
            alertBox.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
            return;
        } else {
            alertBox.style.display = 'none';
        }

        // Populate Basic Details
        document.getElementById('p-photo').src = photoDataURL;
        document.getElementById('p-fname').innerText = document.getElementById('first-name').value;
        document.getElementById('p-lname').innerText = document.getElementById('last-name').value;
        document.getElementById('p-title').innerText = document.getElementById('job-title').value;
        document.getElementById('p-about').innerText = document.getElementById('about-me').value;
        
        // Populate Contact
        document.getElementById('p-mobile').innerText = document.getElementById('mobile').value;
        document.getElementById('p-email').innerText = document.getElementById('email').value;
        document.getElementById('p-location').innerText = document.getElementById('location').value;

        // Populate Experience
        const expContainer = document.getElementById('p-exp-container');
        expContainer.innerHTML = "";
        document.querySelectorAll('#exp-container .repeater-item').forEach(item => {
            const comp = item.querySelector('.exp-comp').value;
            const years = item.querySelector('.exp-years').value;
            const pos = item.querySelector('.exp-pos').value;
            const desc = item.querySelector('.exp-desc-input').value;

            expContainer.innerHTML += `
                <div class="exp-item">
                    <div class="exp-header">${comp} ${years}</div>
                    <div class="exp-title">${pos}</div>
                    <div class="exp-desc">${desc}</div>
                </div>
            `;
        });

        // Populate Education
        const eduContainer = document.getElementById('p-edu-container');
        eduContainer.innerHTML = "";
        document.querySelectorAll('#edu-container .repeater-item').forEach(item => {
            const year = item.querySelector('.edu-year-input').value;
            const uni = item.querySelector('.edu-uni-input').value;
            const deg = item.querySelector('.edu-deg-input').value;
            const perc = item.querySelector('.edu-perc-input').value;
            const desc = item.querySelector('.edu-desc-input').value;

            eduContainer.innerHTML += `
                <div class="edu-item">
                    <div class="edu-year-uni"><span class="edu-year">${year}</span> <span class="edu-uni">${uni}</span></div>
                    <div class="edu-degree">${deg}</div>
                    <div class="edu-desc">${desc}</div>
                    <div class="edu-percent">${perc}</div>
                </div>
            `;
        });

        // Populate Skills
        const skillContainer = document.getElementById('p-skill-container');
        skillContainer.innerHTML = "";
        document.querySelectorAll('#skill-container .repeater-item').forEach(item => {
            const skill = item.querySelector('.skill-val').value;
            skillContainer.innerHTML += `<li>${skill}</li>`;
        });

        // Populate Languages
        const langContainer = document.getElementById('p-lang-container');
        langContainer.innerHTML = "";
        document.querySelectorAll('#lang-container .repeater-item').forEach(item => {
            const lang = item.querySelector('.lang-name').value;
            const prof = item.querySelector('.lang-prof').value;
            
            langContainer.innerHTML += `
                <div class="lang-item">
                    <span>${lang}</span>
                    <div class="lang-bar">
                        <div class="lang-bar-fill" style="width: ${prof}%;"></div>
                    </div>
                </div>
            `;
        });

        // Show Modal
        document.getElementById('preview-modal').style.display = 'block';
    }

    function closePreview() {
        document.getElementById('preview-modal').style.display = 'none';
    }

    function downloadPDF() {
        const element = document.getElementById('resume-document');
        const opt = {
            margin:       0,
            filename:     'My_Resume.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true },
            jsPDF:        { unit: 'px', format: [800, 1131], orientation: 'portrait' }
        };

        // Generate PDF
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
