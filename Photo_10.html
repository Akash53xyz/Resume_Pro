<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Resume Builder & Preview</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        /* CSS Reset and Variables */
        :root {
            --primary-color: #00796b; /* Inspired by green design in examples */
            --background-color: #f4f4f4;
            --text-color: #333;
            --alert-color: #f44336;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --transition-speed: 0.3s;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--background-color);
            margin: 0;
            padding: 0;
            color: var(--text-color);
            line-height: 1.6;
        }

        /* --- Global Page & Container Styles --- */
        .page-container {
            max-width: 1000px;
            margin: 20px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--text-color);
            margin-bottom: 30px;
        }

        /* --- Page & Div Management --- */
        #form-page, #alert-page, #preview-page {
            display: none;
        }
        #form-page { display: block; } /* Initial page */

        /* --- Common Buttons and Headings with '+' --- */
        .btn-plus {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            margin-left: 10px;
            font-weight: bold;
        }
        .btn-plus:hover { background-color: #00695c; }

        .form-heading {
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-top: 30px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            font-size: 22px;
            color: #555;
        }

        /* --- Input Fields Styles --- */
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"], input[type="email"], input[type="file"], textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea { resize: vertical; height: 100px; }
        
        .point-container {
            border: 1px solid #eee;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            position: relative;
        }

        /* Circular Photo Upload & Preview */
        #photo-upload-container {
            text-align: center;
            margin-bottom: 20px;
        }
        #photo-preview-box {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            margin: 0 auto;
            overflow: hidden;
            background: #eee;
            position: relative;
        }
        #photo-preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Percentage Subheading Label Styling */
        .percentage-subheading {
            font-size: 14px;
            font-weight: bold;
            margin-top: 5px;
            display: block;
            color: #777;
        }

        /* --- Validation Alert Page (Detail Page view) --- */
        #alert-page {
            border: 5px solid var(--alert-color);
            padding: 30px;
            border-radius: 8px;
            color: var(--alert-color);
            text-align: center;
        }
        .alert-heading { font-weight: bold; font-size: 30px; margin-bottom: 20px; text-transform: uppercase;}
        .alert-list { text-align: left; margin: 0 auto; max-width: 400px; }
        .alert-list li { margin-bottom: 10px; font-weight: bold; font-size: 18px; color: var(--alert-color); }
        .alert-list li::before { content: "• "; font-weight: bold; margin-right: 5px; }

        /* --- Detailed Resume Preview Page (based on professional design examples) --- */
        #resume-container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            padding: 20px;
        }
        .p-photo-block {
            grid-column: 1 / 2;
            width: 150px;
            height: 150px;
            border-radius: 15px; /* Replicating card frame from design */
            overflow: hidden;
            border: 5px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            margin: -25px 0 20px 20px;
            position: relative;
            z-index: 10;
        }
        .p-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .p-left-col { background: white; padding-left: 20px;}
        .p-right-col { background: white; padding-right: 20px; border-left: 2px solid #eee; padding-left: 20px; }
        .p-name-block { grid-column: 1 / -1; display: flex; align-items: flex-end; padding-bottom: 20px; }
        .p-name-title { margin-left: 20px; }
        .p-name { font-size: 32px; font-weight: bold; color: var(--text-color); margin-bottom: 5px; }
        .p-title { font-size: 18px; color: #777; text-transform: uppercase; letter-spacing: 2px; }
        
        .p-section-heading {
            color: #333;
            text-transform: uppercase;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-top: 25px;
            font-size: 18px;
        }
        .p-text-block { font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 15px; }
        .p-language-point { margin-bottom: 15px; }
        .p-lang-name { font-weight: bold; color: #333; }
        .p-prof-bar-container { width: 100%; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .p-prof-bar { height: 100%; background: #333; border-radius: 4px; }
        .p-contact-item { display: flex; align-items: center; margin-bottom: 10px; font-size: 14px; }
        .p-contact-icon { color: var(--text-color); margin-right: 10px; font-weight: bold; }
        .p-edu-card, .p-work-card { margin-bottom: 20px; }
        .p-card-heading { font-weight: bold; color: #333; font-size: 16px; }
        .p-card-place-date { color: #777; font-size: 14px; font-style: italic; }
        .p-edu-card-points { font-size: 14px; color: #555; line-height: 1.6; list-style-type: disc; margin-left: 20px; }

        /* Pre-Preview and Preview Controls (common styles) */
        .controls-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            margin-bottom: -10px;
        }
        .control-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .control-btn:hover { background-color: #00695c; }
        .control-btn.alert-btn { background-color: var(--alert-color); }
        .control-btn.alert-btn:hover { background-color: #d32f2f; }

    </style>
</head>
<body>

    <div class="page-container">
        <h1>Detailed Resume Builder</h1>

        <div id="form-page">
            <form id="resume-form">
                <div id="photo-upload-container">
                    <label>Profile Photo Upload (Required)</label>
                    <div id="photo-preview-box">
                        <img id="photo-preview" src="" alt="">
                        <input type="file" id="inp-photo" name="photo" accept="image/*" style="opacity: 0; position: absolute; inset: 0; cursor: pointer;">
                    </div>
                </div>

                <div class="form-group">
                    <label>Full Name (Required)</label>
                    <input type="text" id="inp-name" name="name" placeholder="Pedro Fernandes" required>
                </div>
                <div class="form-group">
                    <label>Job Title (Required)</label>
                    <input type="text" id="inp-title" name="title" placeholder="Graphic Designer" required>
                </div>
                <div class="form-group">
                    <label>About Myself / Profile (Required)</label>
                    <textarea id="inp-about" name="about" placeholder="A creative Graphic Designer with over 4 years of experience..." required></textarea>
                </div>

                <fieldset class="form-group">
                    <legend>CONTACT DETAILS (Required)</legend>
                    <div class="form-group">
                        <label>Mob No.</label>
                        <input type="text" id="inp-phone" name="phone" placeholder="+123-456-7890" required>
                    </div>
                    <div class="form-group">
                        <label>Email.</label>
                        <input type="email" id="inp-email" name="email" placeholder="hello@reallygreatsite.com" required>
                    </div>
                    <div class="form-group">
                        <label>Location.</label>
                        <input type="text" id="inp-location" name="location" placeholder="123 Anywhere St., Any City" required>
                    </div>
                </fieldset>

                <h3 class="form-heading">SKILLS <button type="button" class="btn-plus" onclick="addSkillPoint()">+</button></h3>
                <div id="skills-container"></div>

                <h3 class="form-heading">LANGUAGES <button type="button" class="btn-plus" onclick="addLanguagePoint()">+</button></h3>
                <div id="languages-container"></div>

                <h3 class="form-heading">WORK EXPERIENCE <button type="button" class="btn-plus" onclick="addWorkExperiencePoint()">+</button></h3>
                <div id="work-experience-container"></div>

                <h3 class="form-heading">EDUCATION (Required) <button type="button" class="btn-plus" onclick="addEducationPoint()">+</button></h3>
                <div id="education-container"></div>

                <div class="controls-row">
                    <button type="button" class="control-btn" onclick="previewResume()"><i class="fas fa-eye"></i> Preview Resume</button>
                </div>
            </form>
        </div>

        <div id="alert-page">
            <h2 class="alert-heading">MISSING DETAILS IN FORM</h2>
            <p>Your dynamic resume form is incomplete. Please fill in the details for the following required sections:</p>
            <ul id="missing-fields-list" class="alert-list">
                </ul>
            <div class="controls-row">
                <button type="button" class="control-btn alert-btn" onclick="returnToForm()"><i class="fas fa-edit"></i> Edit Resume</button>
                <button type="button" class="control-btn" id="pre-preview-pdf-btn" onclick="downloadPreviewPDF()"><i class="fas fa-file-pdf"></i> Download Preview as PDF</button>
            </div>
        </div>

        <div id="preview-page">
            <h2>YOUR RESUME PREVIEW (Design inspired by photo)</h2>
            <div id="resume-container">
                </div>
            <div class="controls-row">
                <button type="button" class="control-btn" onclick="returnToForm()"><i class="fas fa-edit"></i> Edit Resume</button>
                <button type="button" class="control-btn" id="download-pdf-btn" onclick="downloadResumePDF()"><i class="fas fa-file-pdf"></i> Download in PDF</button>
            </div>
        </div>

    </div>

    <script>
        // Pre-preview state variable
        let prePreviewAlertShown = false;

        // --- Photo Handling ---
        const inpPhoto = document.getElementById('inp-photo');
        const photoPreview = document.getElementById('photo-preview');
        inpPhoto.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    photoPreview.src = event.target.result;
                }
                reader.readAsDataURL(file);
            }
        });

        // --- Dynamic Section Counters and Adders ---
        // 1. Skills
        let skillCounter = 0;
        function addSkillPoint() {
            skillCounter++;
            const container = document.getElementById('skills-container');
            const newPoint = document.createElement('div');
            newPoint.className = 'point-container form-group';
            newPoint.innerHTML = `
                <label>Skill Point ${skillCounter}</label>
                <input type="text" name="skill_${skillCounter}" placeholder="Branding & Visual Identity" required>
            `;
            container.appendChild(newPoint);
        }

        // 2. Languages
        let langCounter = 0;
        function addLanguagePoint() {
            langCounter++;
            const container = document.getElementById('languages-container');
            const newPoint = document.createElement('div');
            newPoint.className = 'point-container form-group';
            newPoint.innerHTML = `
                <label>Language Point ${langCounter}</label>
                <input type="text" name="lang_${langCounter}_name" placeholder="e.g. English" required>
                <label style="margin-top: 10px;">Proficiency Percentage (1-100)</label>
                <input type="number" name="lang_${langCounter}_prof" min="1" max="100" placeholder="100" required>
            `;
            container.appendChild(newPoint);
        }

        // 3. Work Experience Structured Cards
        let workCounter = 0;
        function addWorkExperiencePoint() {
            workCounter++;
            const container = document.getElementById('work-experience-container');
            const newPoint = document.createElement('div');
            newPoint.className = 'point-container form-group';
            newPoint.innerHTML = `
                <label>Work Experience Card ${workCounter}</label>
                <input type="text" name="work_${workCounter}_title" placeholder="e.g. Graphic Designer" required>
                <input type="text" name="work_${workCounter}_company" placeholder="e.g. Studio Shodwe" style="margin-top: 10px;" required>
                <input type="text" name="work_${workCounter}_date" placeholder="e.g. (2000-2004)" style="margin-top: 10px;" required>
                <textarea name="work_${workCounter}_desc" placeholder="Descriptions (bullet per line)" style="margin-top: 10px;"></textarea>
            `;
            container.appendChild(newPoint);
        }

        // 4. Education Structured Cards with Percentage subheading
        let eduCounter = 0;
        function addEducationPoint() {
            eduCounter++;
            const container = document.getElementById('education-container');
            const newPoint = document.createElement('div');
            newPoint.className = 'point-container form-group';
            newPoint.innerHTML = `
                <label>Education Card ${eduCounter}</label>
                <input type="text" name="edu_${eduCounter}_degree" placeholder="e.g. Bachelor of Visual Communication Design" required>
                <input type="text" name="edu_${eduCounter}_place" placeholder="e.g. Rimberio University" style="margin-top: 10px;" required>
                <input type="text" name="edu_${eduCounter}_date" placeholder="e.g. (2000-2004)" style="margin-top: 10px;" required>
                <label class="percentage-subheading">Percentage Subheading Input</label>
                <input type="text" name="edu_${eduCounter}_percentage" placeholder="Percentage/Grade" style="margin-top: 2px;">
            `;
            container.appendChild(newPoint);
        }

        // --- Preview Resume Function with full Validation & Population ---
        function previewResume() {
            const form = document.getElementById('resume-form');
            const formData = new FormData(form);
            const missingFields = [];

            // 1. Validate Form: Required Fields & Photo
            if (!formData.get('photo')) missingFields.push('Profile Photo Upload');
            if (!formData.get('name')) missingFields.push('Full Name');
            if (!formData.get('title')) missingFields.push('Job Title');
            if (!formData.get('about')) missingFields.push('About Myself / Profile');
            if (!formData.get('phone')) missingFields.push('Contact Mob No.');
            if (!formData.get('email')) missingFields.push('Contact Email');
            if (!formData.get('location')) missingFields.push('Contact Location');

            // Collect unique dynamic point IDs from form data names
            const skillIds = [], langIds = [], workIds = [], eduIds = [];
            for (let pair of formData.entries()) {
                const key = pair[0];
                if (key.startsWith('skill_')) skillIds.push(key.split('_')[1]);
                if (key.startsWith('lang_') && key.endsWith('_name')) langIds.push(key.split('_')[1]);
                if (key.startsWith('work_') && key.endsWith('_title')) workIds.push(key.split('_')[1]);
                if (key.startsWith('edu_') && key.endsWith('_degree')) eduIds.push(key.split('_')[1]);
            }

            // Acknowledge dynamic section requirements
            if (skillIds.length === 0) missingFields.push('Add At least 1 Skill Point');
            if (langIds.length === 0) missingFields.push('Add At least 1 Language Point');
            if (workIds.length === 0) missingFields.push('Add At least 1 Work Experience Card');
            if (eduIds.length === 0) missingFields.push('Add At least 1 Education Card');

            // 2. Clear old state and manage views based on validation
            document.getElementById('form-page').style.display = 'none';
            document.getElementById('missing-fields-list').innerHTML = ''; // Clear list
            document.getElementById('resume-container').innerHTML = ''; // Clear preview content

            // If form details are missed, show full detailed red alert page
            if (missingFields.length > 0) {
                missingFields.forEach(field => {
                    const li = document.createElement('li');
                    li.textContent = field;
                    document.getElementById('missing-fields-list').appendChild(li);
                });
                document.getElementById('alert-page').style.display = 'block';
                document.getElementById('preview-page').style.display = 'none';
                prePreviewAlertShown = true;
                return;
            }

            // 3. Validation passes: Populate the structured preview page replicating modern design
            document.getElementById('alert-page').style.display = 'none';
            document.getElementById('preview-page').style.display = 'block';
            prePreviewAlertShown = false;
            
            const resumeContainer = document.getElementById('resume-container');

       // --- Header: Photo, Name, Title ---
            const headerBlock = document.createElement('div');
            headerBlock.className = 'p-name-block';
            headerBlock.innerHTML = `
                <div class="p-photo-block">
                    <img class="p-photo" src="${photoPreview.src}" alt="Profile Photo">
                </div>
                <div class="p-name-title">
                    <div class="p-name">${formData.get('name')}</div>
                    <div class="p-title">${formData.get('title')}</div>
                </div>
            `;
            resumeContainer.appendChild(headerBlock);

            // --- Main Resume Body: 2 Columns ---
            const leftCol = document.createElement('div');
            leftCol.className = 'p-left-col';
            const rightCol = document.createElement('div');
            rightCol.className = 'p-right-col';

            // -- Left Column Contents --
            // Contact
            const contactHeading = document.createElement('h3');
            contactHeading.className = 'p-section-heading';
            contactHeading.textContent = 'CONTACT';
            leftCol.appendChild(contactHeading);

            leftCol.innerHTML += `<div class="p-contact-item"><i class="fas fa-phone p-contact-icon"></i>${formData.get('phone')}</div>`;
            leftCol.innerHTML += `<div class="p-contact-item"><i class="fas fa-envelope p-contact-icon"></i>${formData.get('email')}</div>`;
            leftCol.innerHTML += `<div class="p-contact-item"><i class="fas fa-map-marker-alt p-contact-icon"></i>${formData.get('location')}</div>`;

            // Languages: proficiency bars based on professional design
            const langHeading = document.createElement('h3');
            langHeading.className = 'p-section-heading';
            langHeading.textContent = 'LANGUAGES';
            leftCol.appendChild(langHeading);

            langIds.forEach(id => {
                const name = formData.get(`lang_${id}_name`);
                const prof = formData.get(`lang_${id}_prof`);
                const langPoint = document.createElement('div');
                langPoint.className = 'p-language-point';
                langPoint.innerHTML = `
                    <div class="p-lang-name">• ${name}</div>
                    <div class="p-prof-bar-container">
                        <div class="p-prof-bar" style="width: ${prof}%;"></div>
                    </div>
                `;
                leftCol.appendChild(langPoint);
            });

            // -- Right Column Contents --
            // Profile Text
            const profileHeading = document.createElement('h3');
            profileHeading.className = 'p-section-heading';
            profileHeading.style.marginTop = '0'; // Due to structure
            profileHeading.textContent = 'PROFILE';
            rightCol.appendChild(profileHeading);

            const profileText = document.createElement('p');
            profileText.className = 'p-text-block';
            profileText.textContent = formData.get('about');
            rightCol.appendChild(profileText);

            // Education Cards with percentage subdirectory heading
            const eduHeading = document.createElement('h3');
            eduHeading.className = 'p-section-heading';
            eduHeading.textContent = 'EDUCATION';
            rightCol.appendChild(eduHeading);

            eduIds.forEach(id => {
                const degree = formData.get(`edu_${id}_degree`);
                const place = formData.get(`edu_${id}_place`);
                const date = formData.get(`edu_${id}_date`);
                const percentage = formData.get(`edu_${id}_percentage`);
                
                const eduCard = document.createElement('div');
                eduCard.className = 'p-edu-card';
                eduCard.innerHTML = `
                    <div class="p-card-heading">• ${degree}</div>
                    <div class="p-card-place-date">${place} ${date}</div>
                    ${percentage ? `<div class="percentage-subheading" style="margin-left: 20px;">${percentage}</div>` : ''}
                `;
                rightCol.appendChild(eduCard);
            });

            // Skills list
            const skillHeading = document.createElement('h3');
            skillHeading.className = 'p-section-heading';
            skillHeading.textContent = 'SKILLS';
            rightCol.appendChild(skillHeading);

            const skillGrid = document.createElement('p');
            skillGrid.className = 'p-card-point';
            skillIds.forEach((id, index) => {
                skillGrid.innerHTML += `• ${formData.get(`skill_${id}`)}&nbsp;&nbsp;&nbsp;`;
                if ((index + 1) % 2 === 0) skillGrid.innerHTML += '<br>';
            });
            rightCol.appendChild(skillGrid);

            // Work Experience Cards
            const workHeading = document.createElement('h3');
            workHeading.className = 'p-section-heading';
            workHeading.textContent = 'WORK EXPERIENCE';
            rightCol.appendChild(workHeading);

            workIds.forEach(id => {
                const title = formData.get(`work_${id}_title`);
                const company = formData.get(`work_${id}_company`);
                const date = formData.get(`work_${id}_date`);
                const descText = formData.get(`work_${id}_desc`);

                const workCard = document.createElement('div');
                workCard.className = 'p-work-card';
                workCard.innerHTML = `
                    <div class="p-card-heading">• ${title}</div>
                    <div class="p-card-place-date">${company} ${date}</div>
                `;
                const pointsList = document.createElement('ul');
                pointsList.className = 'p-edu-card-points';
                descText.split('\n').forEach(line => {
                    if (line.trim()) {
                        const li = document.createElement('li');
                        li.textContent = line.trim();
                        pointsList.appendChild(li);
                    }
                });
                workCard.appendChild(pointsList);
                rightCol.appendChild(workCard);
            });

            // Append both columns
            resumeContainer.appendChild(leftCol);
            resumeContainer.appendChild(rightCol);
        }

        // --- Common Edit and View management functions ---
        function returnToForm() {
            document.getElementById('form-page').style.display = 'block';
            document.getElementById('alert-page').style.display = 'none';
            document.getElementById('preview-page').style.display = 'none';
            prePreviewAlertShown = false;
        }

        // --- PDF Download Functions (Using modern standard library via CDN for client-side download in single file) ---
        // 1. Download full dynamic resume page
        function downloadResumePDF() {
            const element = document.getElementById('preview-page');
            const name = document.getElementById('inp-name').value.replace(/\s+/g, '_');
            const opt = {
                margin:       0,
                filename:     `${name}_Detailed_Resume.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        // 2. Download pre-preview view with validation alert and placeholder structure
        function downloadPreviewPDF() {
            if (!prePreviewAlertShown) return; // safeguard
            const element = document.getElementById('alert-page');
            const opt = {
                margin:       [0.5, 0.5, 0.5, 0.5], // standard margins for this alert view
                filename:     `Resume_Preview_Alert.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
