<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumePro | Categories</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --dark: #0f172a;
            --white: #ffffff;
            --bg: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 100px; /* Space for sticky navbar */
        }

        /* --- NAVBAR --- */
        .navbar {
            background: var(--dark);
            color: white;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 0 5%;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.5px;
        }
        .logo i { color: #38bdf8; }

        .menu-btn {
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            transition: var(--transition);
        }

        .menu-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        .nav-details {
            position: absolute;
            top: 80px;
            right: 5%;
            background: var(--dark);
            width: 260px;
            border-radius: 12px;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.4s ease;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            border: 1px solid #e2e8f0;
        }

        .nav-details.active {
            max-height: 500px;
            opacity: 1;
            transform: translateY(0);
            padding: 10px 0;
        }

        .nav-details a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 25px;
            color: #cbd5e1;
            text-decoration: none;
            transition: var(--transition);
            border-bottom: 1px solid #1e293b;
        }

        .nav-details a i {
            width: 20px;
            color: var(--primary);
        }

        .nav-details a:hover {
            background: #1e293b;
            color: white;
            padding-left: 30px;
            
        }

        /* --- MAIN CONTENT --- */
        .menu-wrapper {
            width: 90%;
            max-width: 500px;
            margin-bottom: 50px;
        }

        .page-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 32px;
            color: var(--dark);
        }

        /* --- ACCORDION --- */
        .accordion-item {
            background-color: var(--white);
            border-radius: 16px;
            margin-bottom: 16px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .accordion-item:hover {
            border-color: var(--primary);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .accordion-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px;
            cursor: pointer;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .category-icon {
            font-size: 24px;
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #eff6ff;
            width: 48px;
            height: 48px;
            border-radius: 12px;
        }

        .category-text {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--dark);
        }

        .arrow-icon {
            width: 10px;
            height: 10px;
            border-right: 2px solid var(--text-muted);
            border-bottom: 2px solid var(--text-muted);
            transform: rotate(45deg);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-right: 5px;
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            background-color: #fcfdfe;
        }

        .redirect-link {
            display: flex;
            align-items: center;
            padding: 16px 24px 16px 88px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 500;
            border-top: 1px solid #f1f5f9;
            transition: all 0.2s ease;
        }

        .redirect-link:hover {
            background-color: #f0f7ff;
            color: var(--primary);
            padding-left: 95px;
        }

        /* Active State */
        .accordion-item.active {
            border-color: var(--primary);
            ring: 2px solid var(--primary);
        }

        .accordion-item.active .arrow-icon {
            transform: rotate(-135deg);
            border-color: var(--primary);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-microchip"></i> ResumePro
        </div>

        <button class="menu-btn" onclick="toggleMenu()">
            <i class="fas fa-bars"></i> Menu
        </button>

        <div class="nav-details" id="navDetails">
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
            <a href="Chose_tamplate.html"><i class="fas fa-file-invoice"></i> Templates</a>
            <a href="ATS.html"><i class="fas fa-chart-line"></i> ATS Evaluator</a>
            <a href="#"><i class="fas fa-file-pdf"></i> Project Report</a>
            <a href="#"><i class="fas fa-user"></i> My Profile</a>
        </div>
    </nav>
    
    <main class="menu-wrapper">
        <h1 class="page-title">Resume Categories</h1>

        <div class="accordion-item">
            <div class="accordion-header">
                <div class="header-left">
                    <div class="category-icon"><i class="fas fa-leaf"></i></div>
                    <span class="category-text">Simple</span>
                </div>
                <div class="arrow-icon"></div>
            </div>
            <div class="accordion-content">
                <a href="Minimalist_Layout.html" class="redirect-link">Minimalist Layout</a>
                <a href="Basic_Fresher.html" class="redirect-link">Basic Fresher</a>
            </div>
        </div>

        <div class="accordion-item">
            <div class="accordion-header">
                <div class="header-left">
                    <div class="category-icon"><i class="fas fa-university"></i></div>
                    <span class="category-text">Academic</span>
                </div>
                <div class="arrow-icon"></div>
            </div>
            <div class="accordion-content">
                <a href="Research_Focused.html" class="redirect-link">Research Focused</a>
                <a href="Academic_CV.html" class="redirect-link">Academic CV</a>
            </div>
        </div>

        <div class="accordion-item">
            <div class="accordion-header">
                <div class="header-left">
                    <div class="category-icon"><i class="fas fa-user-tie"></i></div>
                    <span class="category-text">Professional</span>
                </div>
                <div class="arrow-icon"></div>
            </div>
            <div class="accordion-content">
                <a href="Corporate_Style.html" class="redirect-link">Corporate Style</a>
                <a href="Executive_Design.html" class="redirect-link">Executive Design</a>
            </div>
        </div>
        
        <div class="accordion-item">
            <div class="accordion-header">
                <div class="header-left">
                    <div class="category-icon"><i class="fas fa-palette"></i></div>
                    <span class="category-text">Modern</span>
                </div>
                <div class="arrow-icon"></div>
            </div>
            <div class="accordion-content">
                <a href="Card.html" class="redirect-link">Card size</a>
                <a href="#" class="redirect-link"></a>
            </div>
        </div>
    </main>

    <script>
        // --- 1. NAVBAR TOGGLE ---
        function toggleMenu() {
            const menu = document.getElementById('navDetails');
            menu.classList.toggle('active');
        }

        // Close menu if clicked outside
        window.addEventListener('click', function(e) {
            const menu = document.getElementById('navDetails');
            const btn = document.querySelector('.menu-btn');
            if (!menu.contains(e.target) && !btn.contains(e.target)) {
                menu.classList.remove('active');
            }
        });

        // --- 2. ACCORDION LOGIC ---
        document.addEventListener('DOMContentLoaded', function() {
            const headers = document.querySelectorAll('.accordion-header');

            headers.forEach(header => {
                header.addEventListener('click', function() {
                    const item = this.parentNode;
                    const content = item.querySelector('.accordion-content');
                    const isActive = item.classList.contains('active');

                    // Close all other accordions
                    document.querySelectorAll('.accordion-item').forEach(otherItem => {
                        if (otherItem !== item) {
                            otherItem.classList.remove('active');
                            otherItem.querySelector('.accordion-content').style.maxHeight = null;
                        }
                    });

                    // Toggle current
                    if (isActive) {
                        item.classList.remove('active');
                        content.style.maxHeight = null;
                    } else {
                        item.classList.add('active');
                        content.style.maxHeight = content.scrollHeight + "px";
                    }
                });
            });
        });
    </script>
</body>
</html>
