<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Dashboard | Collapsible Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- CSS STYLES --- */
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --white: #ffffff;
            --bg: #f1f5f9;
            --transition: 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--bg);
            padding-top: 80px;
        }

        /* --- STICKY MENU BAR --- */
        .navbar {
            background: var(--dark);
            color: white;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .logo {
            font-size: 1.4rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo i { color: #38bdf8; }

        /* Menu Button (Hamburger) */
        .menu-btn {
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }

        .menu-btn:hover {
            background: var(--primary);
        }

        /* Menu Content (Hidden by Default) */
        .nav-details {
            position: absolute;
            top: 70px;
            right: 5%;
            background: var(--dark);
            width: 250px;
            border-radius: 10px;
            overflow: hidden;
            max-height: 0; /* Hidden */
            transition: max-height 0.4s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* When Menu is Active */
        .nav-details.active {
            max-height: 400px; /* Shows content */
            padding: 10px 0;
        }

        .nav-details a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 25px;
            color: #cbd5e1;
            text-decoration: none;
            transition: var(--transition);
            border-bottom: 1px solid #1e293b;
        }

        .nav-details a:hover {
            background: #1e293b;
            color: white;
            padding-left: 30px;
        }

        /* --- DASHBOARD CONTENT --- */

.btn-container {
    margin-top: 40px;
    display: flex;
    justify-content: center;
    gap: 20px;
}

.main-btn {
    padding: 18px 35px;
    border-radius: 50px;
    border: none;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
}
img {
      width: 200px;
      margin: 10px;
      cursor: pointer;
    }
.back-btn { background: #2563eb; color: white; }

.main-btn:hover { transform: scale(1.05); }

    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-microchip"></i> ResumePro
            
        </div>

        <button class="menu-btn" onclick="toggleMenu()">
            <i class="fas fa-bars"></i> Menu
        </button>

        <div class="nav-details" id="navDetails">
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
            <a href="Chose_tamplate"><i class="fas fa-file-invoice"></i> Templates</a>
            <a href="ATS.html"><i class="fas fa-chart-line"></i> ATS Evaluator</a>
            <a href="#"><i class="fas fa-file-pdf"></i> Project Report</a>
            <a href="#"><i class="fas fa-user"></i> My Profile</a>
        </div>
    </nav>

        <h1>Simple Minimalist Layout Resume Template <h1/>

        <div class="btn-container">
          <button class="main-btn back-btn" id="go-create">Back</button>
            
        </div>
    </main>


    <script>
        // --- 1. MENU TOGGLE LOGIC ---
        function toggleMenu() {
            const menu = document.getElementById('navDetails');
            menu.classList.toggle('active');
        }

        // Close menu if clicked outside
        window.onclick = function(event) {
            if (!event.target.closest('.navbar')) {
                document.getElementById('navDetails').classList.remove('active');
            }
        }

       

        // --- 3. REDIRECTION LOGIC ---
    // Select the buttons using their IDs
    const goCreate = document.getElementById('go-create');

    // Add click events to the buttons
    goCreate.addEventListener('click', () => {
        window.location.href = 'Chose_tamplate.html'; 
    });

    
    </script>
</body>
</html>
