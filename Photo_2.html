<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Resume Builder</title>
    <style>
        /* --- General Reset & Styles --- */
        :root {
            --dark-blue: #1C2A39; /* Matched from image */
            --light-grey: #F5F7FA;
            --text-grey: #666;
            --accent-green: #2ecc71; /* Safe Green for accents */
            --error-red: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-grey);
            padding: 20px;
            color: #333;
        }

        h1, h2, h3 {
            color: var(--dark-blue);
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 4px;
            padding: 10px 20px;
            font-weight: bold;
            transition: background 0.3s;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
        }

        /* --- Global Form Styles --- */
        #main-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .form-section {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--light-grey);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .add-btn {
            background-color: var(--accent-green);
            color: white;
            padding: 5px 10px;
            font-size: 18px;
        }
        .add-btn:hover { background-color: #27ae60; }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            font-size: 14px;
            color: #555;
        }

        .dynamic-entry {
            border: 1px dashed #ccc;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
            border-radius: 4px;
        }

        .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: var(--error-red);
            color: white;
            padding: 3px 8px;
            font-size: 12px;
        }

        .submit-container {
            text-align: center;
            margin-top: 30px;
        }

        #preview-btn {
            background-color: var(--dark-blue);
            color: white;
            font-size: 18px;
            padding: 15px 40px;
        }
        #preview-btn:hover { background-color: #2c3e50; }

        /* Validation Styling */
        input.error, textarea.error {
            border: 2px solid var(--error-red);
            background-color: #fff6f6;
        }

        /* --- Resume Preview Styles --- */
        #resume-builder, #preview-container {
            display: block;
        }

        #preview-container {
            display: none; /* Hidden by default */
        }

        .preview-actions {
            max-width: 210mm; /* A4 width */
            margin: 0 auto 20px auto;
            text-align: right;
        }

        #edit-btn {
            background-color: #95a5a6;
            color: white;
        }

        #download-btn {
            background-color: var(--accent-green);
            color: white;
        }

        /* --- A4 Resume Layout (Matching Image) --- */
        .resume-page {
            width: 210mm;
            min-height: 297mm;
            background: white;
            margin: 0 auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            overflow: hidden;
        }

        /* Left Sidebar */
        .sidebar {
            width: 32%;
            background-color: var(--dark-blue);
            color: white;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .profile-photo-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 30px auto;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid rgba(255,255,255,0.2);
        }

        #preview-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .sidebar h2 {
            color: white;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
            margin-top: 30px;
            margin-bottom: 15px;
        }
        .sidebar h2:first-of-type { margin-top: 0; }

        .sidebar ul {
            list-style: none;
            font-size: 14px;
            line-height: 2;
        }

        .contact-info-block {
            font-size: 13px;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        .contact-icon {
            display: inline-block;
            width: 20px;
            margin-right: 5px;
            opacity: 0.7;
        }

        /* Main Content */
        .main-content {
            width: 68%;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .header-box {
            background-color: #E6E9EE;
            padding: 30px 50px;
            margin-top: 40px; /* offset top */
        }

        .header-box h1 {
            text-transform: uppercase;
            font-size: 32px;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .header-box p {
            color: var(--text-grey);
            text-transform: uppercase;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .body-sections {
            padding: 40px 50px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        /* Full width items in grid */
        .about-section, .experience-section {
            grid-column: span 2;
        }

        .main-content h2 {
            font-size: 18px;
            text-transform: uppercase;
            color: var(--dark-blue);
            margin-bottom: 15px;
        }

        .main-content p {
            font-size: 14px;
            color: var(--text-grey);
            line-height: 1.6;
        }

        .entry-block {
            margin-bottom: 15px;
        }

        .entry-block p.dates {
            font-size: 13px;
            color: #888;
            margin-bottom: 5px;
        }

        .entry-block p.title {
            color: #333;
            font-weight: bold;
        }

        .main-content ul {
            list-style: disc;
            margin-left: 18px;
            font-size: 13px;
            color: var(--text-grey);
            line-height: 1.6;
        }

        /* --- PDF/Print Styling --- */
        @media print {
            body {
                padding: 0;
                background: white;
            }

            #resume-builder, .preview-actions {
                display: none !important;
            }

            #preview-container {
                display: block !important;
            }

            .resume-page {
                box-shadow: none;
                margin: 0;
                width: 100%;
                height: 100%;
            }

            /* Ensure background colors print */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>
<body>

<div id="main-container">

    <div id="resume-builder">
        <h1 style="text-align: center; margin-bottom: 20px;">Resume Builder</h1>
        
        <div class="form-section">
            <h2>Header & About Me</h2>
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="form-name" class="required" placeholder="Daniel Gallego">
            </div>
            <div class="form-group">
                <label>Job Title *</label>
                <input type="text" id="form-title" class="required" placeholder="Graphic Designer">
            </div>
            <div class="form-group">
                <label>About Me</label>
                <textarea id="form-about" rows="4" placeholder="Brief professional summary..."></textarea>
            </div>
        </div>

        <div class="form-section">
            <h2>Photo & Contact Details</h2>
            <div class="form-group">
                <label>Profile Photo *</label>
                <input type="file" id="form-photo" class="required" accept="image/*">
            </div>
            <div class="form-group">
                <label>Mobile Number *</label>
                <input type="tel" id="form-phone" class="required" placeholder="+123-456-7890">
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="form-email" class="required" placeholder="hello@reallygreatsite.com">
            </div>
            <div class="form-group">
                <label>Location (City, Country)</label>
                <input type="text" id="form-location" placeholder="Jakarta, Indonesia">
            </div>
        </div>

        <div class="form-section">
            <div class="section-header">
                <h2>Skills</h2>
                <button type="button" class="add-btn" onclick="addSimpleListEntry('skills-form-list')">+</button>
            </div>
            <div id="skills-form-list">
                <div class="form-group"><input type="text" placeholder="e.g., Adobe Photoshop"></div>
            </div>
        </div>

        <div class="form-section">
            <div class="section-header">
                <h2>Languages</h2>
                <button type="button" class="add-btn" onclick="addSimpleListEntry('languages-form-list')">+</button>
            </div>
            <div id="languages-form-list">
                <div class="form-group"><input type="text" placeholder="e.g., English (Native)"></div>
            </div>
        </div>

        <div class="form-section">
            <div class="section-header">
                <h2>Work Experience</h2>
                <button type="button" class="add-btn" onclick="addExperienceEntry()">+</button>
            </div>
            <div id="experience-form-list">
                </div>
        </div>

        <div class="form-section">
            <div class="section-header">
                <h2>Education</h2>
                <button type="button" class="add-btn" onclick="addEducationEntry()">+</button>
            </div>
            <div id="education-form-list">
                </div>
        </div>

        <div class="form-section">
            <div class="section-header">
                <h2>Certification</h2>
                <button type="button" class="add-btn" onclick="addSimpleListEntry('cert-form-list')">+</button>
            </div>
            <div id="cert-form-list">
                <div class="form-group"><input type="text" placeholder="e.g., Adobe Certified Professional... (2018)"></div>
            </div>
        </div>

        <div class="submit-container">
            <button type="button" id="preview-btn" onclick="generatePreview()">Preview Resume</button>
        </div>

    </div> <div id="preview-container">
        
        <div class="preview-actions">
            <button type="button" id="edit-btn" onclick="showForm()">Edit</button>
            <button type="button" id="download-btn" onclick="downloadPdf()">Download PDF</button>
        </div>

        <div class="resume-page" id="resume-a4">
            
            <div class="sidebar">
                <div class="profile-photo-container">
                    <img src="" id="preview-photo" alt="Profile">
                </div>

                <h2>Skills</h2>
                <ul id="preview-skills">
                    </ul>

                <h2>Languages</h2>
                <ul id="preview-languages">
                    </ul>

                <h2>Contact</h2>
                <div class="contact-info-block">
                    <div><span class="contact-icon">&#128222;</span><span id="preview-phone"></span></div>
                    <div><span class="contact-icon">&#9993;</span><span id="preview-email"></span></div>
                    <div><span class="contact-icon">&#128205;</span><span id="preview-location"></span></div>
                </div>
            </div>

            <div class="main-content">
                <div class="header-box">
                    <h1 id="preview-name">DANIEL GALLEGO</h1>
                    <p id="preview-title">Graphic Designer</p>
                </div>

                <div class="body-sections">
                    
                    <div class="about-section">
                        <h2>About Me</h2>
                        <p id="preview-about">I am a passionate...</p>
                    </div>

                    <div class="experience-section">
                        <h2>Experience</h2>
                        <div id="preview-experience-list">
                            </div>
                    </div>

                    <div class="education-section">
                        <h2>Education</h2>
                        <div id="preview-education-list">
                            </div>
                    </div>

                    <div class="certification-section">
                        <h2>Certification</h2>
                        <ul id="preview-certification-list">
                            </ul>
                    </div>

                </div>
            </div>
        </div>
    </div> </div> <script>
    // --- Dynamic Form Functionality ---

    // Function to add simple text inputs (Skills, Languages, Certs)
    function addSimpleListEntry(containerId) {
        const container = document.getElementById(containerId);
        const div = document.createElement('div');
        div.className = 'form-group dynamic-item';
        div.innerHTML = `
            <div style="display:flex; gap: 5px;">
                <input type="text" placeholder="Entry">
                <button type="button" class="remove-btn" style="position:static;" onclick="removeEntry(this)">-</button>
            </div>
        `;
        container.appendChild(div);
    }

    // Function to add complex Work Experience blocks
    function addExperienceEntry() {
        const container = document.getElementById('experience-form-list');
        const entryDiv = document.createElement('div');
        entryDiv.className = 'dynamic-entry';
        entryDiv.innerHTML = `
            <button type="button" class="remove-btn" onclick="removeEntry(this)">Remove</button>
            <div class="form-group"><label>Dates (e.g., 2019 - Present)</label><input type="text" class="exp-dates"></div>
            <div class="form-group"><label>Job Title</label><input type="text" class="exp-title"></div>
            <div class="form-group"><label>Company Name</label><input type="text" class="exp-company"></div>
            <div class="form-group"><label>Job Description / Responsibilities</label><textarea class="exp-desc" rows="3" placeholder="Enter each point on a new line"></textarea></div>
        `;
        container.appendChild(entryDiv);
    }

    // Function to add Education blocks
    function addEducationEntry() {
        const container = document.getElementById('education-form-list');
        const entryDiv = document.createElement('div');
        entryDiv.className = 'dynamic-entry';
        entryDiv.innerHTML = `
            <button type="button" class="remove-btn" onclick="removeEntry(this)">Remove</button>
            <div class="form-group"><label>Dates (e.g., 2012 - 2015)</label><input type="text" class="edu-dates"></div>
            <div class="form-group"><label>Degree / Title</label><input type="text" class="edu-title"></div>
            <div class="form-group"><label>University / School</label><input type="text" class="edu-university"></div>
        `;
        container.appendChild(entryDiv);
    }

    // Remove dynamic entry
    function removeEntry(button) {
        button.closest('.dynamic-entry, .dynamic-item').remove();
    }

    // Initialize one entry for experience/education
    addExperienceEntry();
    addEducationEntry();

    // --- Core Logic ---

    // 1. Validation
    function validateForm() {
        let isValid = true;
        const requiredInputs = document.querySelectorAll('#resume-builder .required');
        
        requiredInputs.forEach(input => {
            if (input.type === 'file') {
                if (!input.files.length) {
                    input.classList.add('error');
                    isValid = false;
                } else {
                    input.classList.remove('error');
                }
            } else {
                if (!input.value.trim()) {
                    input.classList.add('error');
                    isValid = false;
                } else {
                    input.classList.remove('error');
                }
            }
        });

        if (!isValid) {
            alert("Please fill in all mandatory fields (marked with *) and upload a photo.");
        }
        return isValid;
    }

    // 2. Data Transfer and Preview
    function generatePreview() {
        if (!validateForm()) return;

        // Photo Handling
        const photoInput = document.getElementById('form-photo');
        if (photoInput.files && photoInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('preview-photo').src = e.target.result;
            }
            reader.readAsDataURL(photoInput.files[0]);
        }

        // Basic Info
        document.getElementById('preview-name').textContent = document.getElementById('form-name').value;
        document.getElementById('preview-title').textContent = document.getElementById('form-title').value;
        document.getElementById('preview-about').textContent = document.getElementById('form-about').value;
        document.getElementById('preview-phone').textContent = document.getElementById('form-phone').value;
        document.getElementById('preview-email').textContent = document.getElementById('form-email').value;
        document.getElementById('preview-location').textContent = document.getElementById('form-location').value;

        // Skills (Simple list)
        transferSimpleList('skills-form-list', 'preview-skills');
        
        // Languages (Simple list)
        transferSimpleList('languages-form-list', 'preview-languages');

        // Certifications (Simple list)
        transferSimpleList('cert-form-list', 'preview-certification-list');

        // Work Experience (Complex blocks)
        const previewExpList = document.getElementById('preview-experience-list');
        previewExpList.innerHTML = ''; // Clear existing
        document.querySelectorAll('#experience-form-list .dynamic-entry').forEach(entry => {
            const dates = entry.querySelector('.exp-dates').value;
            const title = entry.querySelector('.exp-title').value;
            const company = entry.querySelector('.exp-company').value;
            const descText = entry.querySelector('.exp-desc').value;

// Handle description as a list (one per line)
            let descHtml = '';
            if (descText) {
                const points = descText.split('\n').filter(point => point.trim() !== '');
                if (points.length) {
                    descHtml = '<ul>' + points.map(p => `<li>${p}</li>`).join('') + '</ul>';
                }
            }

            if (title || company) {
                const blockHtml = `
                    <div class="entry-block">
                        <p class="dates">${dates}</p>
                        <p class="title">${title} | ${company}</p>
                        ${descHtml}
                    </div>
                `;
                previewExpList.innerHTML += blockHtml;
            }
        });

        // Education (Complex blocks)
        const previewEduList = document.getElementById('preview-education-list');
        previewEduList.innerHTML = '';
        document.querySelectorAll('#education-form-list .dynamic-entry').forEach(entry => {
            const dates = entry.querySelector('.edu-dates').value;
            const title = entry.querySelector('.edu-title').value;
            const university = entry.querySelector('.edu-university').value;

            if (title || university) {
                const blockHtml = `
                    <div class="entry-block">
                        <p class="dates">${dates}</p>
                        <p class="title">${title}</p>
                        <p>${university}</p>
                    </div>
                `;
                previewEduList.innerHTML += blockHtml;
            }
        });

        // Switch view
        document.getElementById('resume-builder').style.display = 'none';
        document.getElementById('preview-container').style.display = 'block';
        window.scrollTo(0, 0); // Scroll to top of preview
    }

    // Helper for simple list transfer
    function transferSimpleList(formContainerId, previewUlId) {
        const inputs = document.querySelectorAll(`#${formContainerId} input`);
        const ulOutput = document.getElementById(previewUlId);
        ulOutput.innerHTML = ''; // Clear
        inputs.forEach(input => {
            if (input.value.trim()) {
                const li = document.createElement('li');
                li.textContent = input.value;
                ulOutput.appendChild(li);
            }
        });
    }

    // 3. Edit Form
    function showForm() {
        document.getElementById('resume-builder').style.display = 'block';
        document.getElementById('preview-container').style.display = 'none';
    }

    // 4. Download PDF
    function downloadPdf() {
        // Use browser's print dialog. The CSS `@media print` will handle formatting to look like image.
        // Tell user how to save if needed, but modern browsers usually default to "Save as PDF".
        alert('Opening print dialog. Please ensure "Save as PDF" is selected as the destination to download your resume.');
        window.print();
    }
</script>

</body>
</html>
